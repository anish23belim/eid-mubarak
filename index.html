<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Greeting</title>
    
    <!-- Open Graph / Social Sharing Meta Tags -->
    <meta property="og:title" content="🌙 Aapke liye Eid ka khas tohfa! ✨">
    <meta property="og:description" content="Click karke apna special Eid Mubarak greeting dekhein.">
    <meta property="og:image" content="https://raw.githubusercontent.com/anish23belim/eid-mubarak/main/bg.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Confetti script -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="stars" id="stars-container"></div>
    
    <!-- Animated Lanterns -->
    <div class="lantern lantern-left">
        <svg viewBox="0 0 100 150" width="100%" height="100%">
            <line x1="50" y1="0" x2="50" y2="30" stroke="#D4AF37" stroke-width="2"/>
            <path d="M45 30 Q50 15 55 30 Z" fill="#D4AF37"/>
            <rect x="40" y="30" width="20" height="4" fill="#D4AF37" rx="2"/>
            <polygon points="40,34 60,34 70,80 30,80" fill="rgba(212, 175, 55, 0.15)" stroke="#D4AF37" stroke-width="2"/>
            <rect x="25" y="80" width="50" height="4" fill="#D4AF37" rx="2"/>
            <polygon points="35,84 65,84 55,100 45,100" fill="#D4AF37"/>
            <circle cx="50" cy="65" r="8" fill="#F9E596" class="lantern-glow"/>
            <path d="M47 65 Q50 50 53 65 Z" fill="#F9E596"/>
            <line x1="40" y1="34" x2="70" y2="80" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
            <line x1="60" y1="34" x2="30" y2="80" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
        </svg>
    </div>
    
    <div class="lantern lantern-right">
        <svg viewBox="0 0 100 150" width="100%" height="100%">
            <line x1="50" y1="0" x2="50" y2="40" stroke="#D4AF37" stroke-width="2"/>
            <path d="M40 40 Q50 20 60 40 Z" fill="#D4AF37"/>
            <rect x="35" y="40" width="30" height="5" fill="#D4AF37" rx="2"/>
            <polygon points="35,45 65,45 75,95 25,95" fill="rgba(212, 175, 55, 0.15)" stroke="#D4AF37" stroke-width="2"/>
            <rect x="20" y="95" width="60" height="5" fill="#D4AF37" rx="2"/>
            <polygon points="30,100 70,100 55,120 45,120" fill="#D4AF37"/>
            <circle cx="50" cy="75" r="10" fill="#F9E596" class="lantern-glow"/>
            <path d="M46 75 Q50 55 54 75 Z" fill="#F9E596"/>
            <line x1="35" y1="45" x2="75" y2="95" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
            <line x1="65" y1="45" x2="25" y2="95" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
        </svg>
    </div>

    <!-- Audio Element -->
    <audio id="bg-music" loop>
        <source src="411.mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" class="music-btn" aria-label="Toggle Music" style="display: none;">
        🎵 Play Music
    </button>

    <!-- 1. Form View -->
    <div class="container" id="form-view">
        <div class="moon"></div>
        <h1 class="title">Eid Mubarak</h1>
        <p class="subtitle">Send warm wishes to your loved ones</p>
        
        <form id="greeting-form">
            <div class="input-group">
                <input type="text" id="name" required placeholder="Enter Your Name" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="tel" id="mobile" placeholder="Enter Mobile Number (Optional)" autocomplete="off">
            </div>
            <button type="submit" class="btn-glow">Create Greeting</button>
        </form>
    </div>

    <!-- 2. Surprise View (Click to Open) -->
    <div class="container" id="surprise-view" style="display: none; cursor: pointer;">
        <div class="moon"></div>
        <h1 class="title">You have a Surprise!</h1>
        <p class="subtitle">Tap anywhere to open</p>
        <div class="btn-glow" style="text-align: center; margin-top: 20px;">Open Greeting 🎁</div>
    </div>

    <!-- 3. Greeting View -->
    <div class="greeting-container fade-in" id="greeting-view" style="display: none;">
        <div class="moon large"></div>
        
        <div class="greeting-content">
            <div class="calligraphy-container">
                <svg class="calligraphy-svg" viewBox="0 0 400 120">
                    <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="calligraphy-text" id="arabic-text-svg">عيد مبارك</text>
                </svg>
            </div>
            <h1 class="main-greeting">Eid Mubarak</h1>
            <h3 class="user-name" id="display-name">Guest</h3>
            
            <p class="message" id="dynamic-message">
                May the divine blessings of Allah bring you hope, faith, and joy on Eid-ul-Fitr and forever.
            </p>
            
            <div class="action-buttons">
                <button id="whatsapp-share" class="btn-whatsapp">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="wa-icon"> Share on WhatsApp
                </button>
                <button type="button" id="create-own" class="btn-outline">Create Your Own</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
